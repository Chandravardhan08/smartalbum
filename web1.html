<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Album AI Ultimate</title>

<style>
    body,html{
  margin:0;
  padding:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

/* SECTIONS */
.section{
  display:none;
  padding:15px;
  z-index:2;
  position:relative;
  width:100%;
  box-sizing:border-box;
  
}

/* BOX (LOGIN / SIGNUP) */
.box{
  width:90%;
  max-width:400px;
  margin:auto;
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:12px;
  
}


/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  box-sizing:border-box;
  font-size:16px;
}

/* BUTTONS */
button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  background:#38bdf8;
  cursor:pointer;
  font-size:14px;
}

/* GRID PREVIEW */
.preview{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  width:100%;
}

/* MEDIA */
img,video,audio{
  width:100%;
  max-width:100%;
  border-radius:10px;
}

/* PROFILE PIC */
#profilePic{
  position:fixed;
  top:10px;
  right:10px;
  width:45px;
  height:45px;
  border-radius:50%;
  border:2px solid #38bdf8;
  display:none;
  cursor:pointer;
  z-index:3;
}

/* MENU */
#menu{
  position:fixed;
  top:60px;
  right:10px;
  background:black;
  border-radius:10px;
  display:none;
  flex-direction:column;
  padding:10px;
  z-index:3;
  width:160px;
}

/* FULL SCREEN VIEWER */
#viewer{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#viewerContent img,
#viewerContent video{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* CAMERA */
#cam{
  width:100%;
  max-height:70vh;
  border-radius:10px;
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:1;
}

/* MOBILE OPTIMIZATION */
@media(max-width:600px){
  button{
    width:100%;
    font-size:16px;
  }

  .box{
    padding:15px;
  }

  #menu{
    width:140px;
  }
}
body,html{margin:0;padding:0;font-family:Arial;background:#0f172a;color:white;overflow:hidden;}
.section{display:none;padding:20px;z-index:2;position:relative;}
.box{width:300px;margin:auto;background:rgba(255,255,255,0.08);padding:20px;border-radius:12px;}
input{width:90%;padding:10px;margin:6px;border-radius:8px;border:none}
button{padding:8px;margin:5px;border-radius:8px;border:none;background:#38bdf8;cursor:pointer}
.preview{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
img,video,audio{width:200px;border-radius:10px}

#profilePic{position:fixed;top:10px;right:10px;width:50px;height:50px;border-radius:50%;border:2px solid #38bdf8;display:none;cursor:pointer;z-index:3;}
#menu{position:fixed;top:70px;right:10px;background:black;border-radius:10px;display:none;flex-direction:column;padding:10px;z-index:3;}

#viewer{position:fixed;top:0;left:0;width:100vw;height:100vh;background:black;display:none;justify-content:center;align-items:center;z-index:9999;}
#viewerContent img,#viewerContent video{width:100%;height:100%;object-fit:contain}

canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
</style>
</head>

<body onclick="unlockAudio()">

<canvas id="particlesCanvas"></canvas>

<img id="profilePic">
<div id="menu">
<button onclick="showProfile()">Profile</button>
<button onclick="changeProfilePic()">Change Profile Pic</button>
<button onclick="changePassword()">Change Password</button>
<button onclick="deleteAccount()">Delete Account</button>
<button onclick="logout()">Logout</button>
</div>

<div id="viewer" onclick="closeViewer()">
<div id="viewerContent"></div>
</div>

<!-- LOGIN -->
<div id="login" class="section" style="display:block">
<div class="box">
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="show('signup')">Signup</button>
</div>
</div>

<!-- SIGNUP -->
<div id="signup" class="section">
<div class="box">
<input id="newEmail" placeholder="Email">
<input id="newPass" type="password" placeholder="password">
<label for="newphoneno">Enter your phone number:</label>
<input id="newphoneno" type="tel" placeholder="e.g. +911234567890" 
       pattern="[0-9]{10,15}" required>
<label for="general">Select Gender:</label>
<select id="general" name="gender">
  <option value="male">Male</option>
  <option value="female">Female</option>
  <option value="others">Others</option>
</select>
<button onclick="signup()">Create</button>
</div>
</div>
<div id="online" class="section" style="display: none;">
  <button onclick="show('dash')">Back</button>
  <br>
  <br>
  <a href="https://www.5movierulz.army/" target="_blank">
    <button>MOVIES</button>
  </a>
  <a href="https://animelok.xyz/languages/telugu" target="_blank">
  <button>ANIME</button>
  </a>
</div>

<!-- DASH -->
<div id="dash" class="section">
  <br><br><br><br>
<button onclick="show('images')">Images</button>
<button onclick="show('videos')">Videos</button>
<button onclick="show('music')">Music</button>
<button onclick="show('docs')">Docs</button>
<button onclick="show('online')">online</button>
<button onclick="show('camera')">Camera</button>
<button onclick="show('trash')">Trash</button>
</div>

<!-- SECTIONS -->
<div id="images" class="section"><button onclick="show('dash')">Back</button><input type="file" multiple accept="image/*" onchange="saveFile(this.files,'image')"><div id="imgPreview" class="preview"></div></div>
<div id="videos" class="section"><button onclick="show('dash')">Back</button><input type="file" multiple accept="video/*" onchange="saveFile(this.files,'video')"><div id="vidPreview" class="preview"></div></div>
<div id="music" class="section"><button onclick="show('dash')">Back</button><input type="file" multiple accept="audio/*" onchange="saveFile(this.files,'music')"><div id="musicPreview" class="preview"></div></div>
<div id="docs" class="section"><button onclick="show('dash')">Back</button><input type="file" multiple onchange="saveFile(this.files,'doc')"><div id="docPreview" class="preview"></div></div>

<div id="camera" class="section">
<button onclick="goBack();stopCam()">Back</button>
<video id="cam" autoplay></video><br>
<button onclick="capture()">📸</button>
</div>

<div id="trash" class="section"><button onclick="show('dash')">Back</button><div id="trashPreview" class="preview"></div></div>

<script>
    window.addEventListener("resize",()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});
let db,currentUser,currentAudio=null,currentVideo=null;

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
if(id==="camera") startCam();
}
function goBack(){closeViewer();show("dash");}

/* AUTH */
function signup(){
localStorage.setItem("user",JSON.stringify({email:newEmail.value,pass:btoa(newPass.value)}));
show("login");
}
function login(){
let u=JSON.parse(localStorage.getItem("user"));
if(u && u.email===loginEmail.value && u.pass===btoa(loginPass.value)){
currentUser=u;
profilePic.src=u.pic||"https://via.placeholder.com/50";
profilePic.style.display="block";
show("dash");
startListening();
startParticles();
}else alert("Wrong login");
}
function logout(){location.reload();}

/* PROFILE */
profilePic.onclick=(e)=>{
e.stopPropagation();
menu.style.display=menu.style.display==="flex"?"none":"flex";
};
document.addEventListener("click",(e)=>{
if(!menu.contains(e.target)&&e.target!==profilePic) menu.style.display="none";
});

function showProfile(){alert(currentUser.email);}
function changeProfilePic(){
let i=document.createElement("input");i.type="file";
i.onchange=()=>{
let r=new FileReader();
r.onload=e=>{
profilePic.src=e.target.result;
currentUser.pic=e.target.result;
localStorage.setItem("user",JSON.stringify(currentUser));
};
r.readAsDataURL(i.files[0]);
};
i.click();
}
function changePassword(){
let old=prompt("Old password");
if(btoa(old)!==currentUser.pass)return alert("Wrong");
let np=prompt("New password");
currentUser.pass=btoa(np);
localStorage.setItem("user",JSON.stringify(currentUser));
}
function deleteAccount(){
if(confirm("Delete account?")){
localStorage.removeItem("user");
indexedDB.deleteDatabase("album");
location.reload();
}
}

/* CAMERA */
function startCam(){navigator.mediaDevices.getUserMedia({video:true}).then(s=>cam.srcObject=s)}
function stopCam(){if(cam.srcObject)cam.srcObject.getTracks().forEach(t=>t.stop())}
function capture(){
let c=document.createElement("canvas");
c.width=cam.videoWidth;c.height=cam.videoHeight;
c.getContext("2d").drawImage(cam,0,0);
c.toBlob(b=>saveFile([new File([b],"photo.png")],"image"));
}

/* DB */
let req=indexedDB.open("album",1);
req.onupgradeneeded=e=>e.target.result.createObjectStore("media",{keyPath:"id"});
req.onsuccess=e=>{db=e.target.result;load();};

/* SAVE */
function saveFile(files,type){
for(let f of files){
let name=prompt("Name")||f.name;
let deleteTime=prompt("Auto delete yyyy-mm-dd hh:mm")||"";
db.transaction("media","readwrite").objectStore("media")
.put({id:Date.now()+Math.random(),blob:f,type,name:name.toLowerCase(),deleted:false,deleteTime});
}
load();
}

/* SHARE FIX FINAL */
function shareFile(file, name) {
  // Native share (mobile-friendly)
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({
      title: name,
      files: [file]
    }).catch(() => {});
    return;
  }

  // Fallback for desktop: download the file
  const a = document.createElement("a");
  a.href = URL.createObjectURL(file);
  a.download = name;
  a.click();

  // Optional: revoke URL after a short delay
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}
/* LOAD */
function load(){
imgPreview.innerHTML=vidPreview.innerHTML=musicPreview.innerHTML=docPreview.innerHTML=trashPreview.innerHTML="";
let now=new Date();

db.transaction("media").objectStore("media").openCursor().onsuccess=e=>{
let c=e.target.result;if(!c)return;
let i=c.value;

/* AUTO DELETE */
if(i.deleteTime){
let [d,t]=i.deleteTime.split(" ");
if(d && t){
let D=d.split("-"),T=t.split(":");
let exp=new Date(D[0],D[1]-1,D[2],T[0],T[1]);
if(now>=exp && !i.deleted){
i.deleted=true;
db.transaction("media","readwrite").objectStore("media").put(i);
}
}
}

let url=URL.createObjectURL(i.blob);
let box=document.createElement("div");
let title=document.createElement("p");title.innerText=i.name;

let el;
if(i.type==="image"){el=document.createElement("img");el.src=url;}
if(i.type==="video"){el=document.createElement("video");el.src=url;el.controls=true;}
if(i.type==="music"){el=document.createElement("audio");el.src=url;el.controls=true;}
if(i.type==="doc"){el=document.createElement("p");el.innerText="📄 "+i.name;}

let del=document.createElement("button");
del.innerText="Delete";
del.onclick=()=>{i.deleted=true;db.transaction("media","readwrite").objectStore("media").put(i);load();};

let share=document.createElement("button");
share.innerText="Share";
share.onclick=()=>shareFile(i.blob,i.name);

let restore=document.createElement("button");
restore.innerText="Restore";
restore.onclick=()=>{i.deleted=false;db.transaction("media","readwrite").objectStore("media").put(i);load();};

let forever=document.createElement("button");
forever.innerText="Delete Forever";
forever.onclick=()=>{db.transaction("media","readwrite").objectStore("media").delete(i.id);load();};

if(i.deleted){
box.append(title,el,restore,forever);
trashPreview.append(box);
}else{
box.append(title,el,del,share);
if(i.type==="image") imgPreview.append(box);
if(i.type==="video") vidPreview.append(box);
if(i.type==="music") musicPreview.append(box);
if(i.type==="doc") docPreview.append(box);
}

c.continue();
};
}

/* VIEW */
function showMedia(name,type){
name=name.toLowerCase();
db.transaction("media").objectStore("media").openCursor().onsuccess=e=>{
let c=e.target.result;if(!c)return;
let i=c.value;
if(!i.deleted && i.type===type && i.name.includes(name)){
let url=URL.createObjectURL(i.blob);
viewerContent.innerHTML= type==="image"
? `<img src="${url}">`
: `<video id="v" src="${url}" autoplay controls></video>`;
viewer.style.display="flex";
currentVideo=document.getElementById("v");
return;
}
c.continue();
};
}

/* STOP */
function stopAll(){
if(currentAudio){currentAudio.pause();currentAudio=null;}
if(currentVideo){currentVideo.pause();}
closeViewer();
}
function closeViewer(){viewer.style.display="none";}

/* MUSIC */
function playMusic(name){
name=name.toLowerCase();
db.transaction("media").objectStore("media").openCursor().onsuccess=e=>{
let c=e.target.result;if(!c)return;
let i=c.value;
if(i.type==="music"&&!i.deleted&&(name===""||i.name.includes(name))){
currentAudio=new Audio(URL.createObjectURL(i.blob));
currentAudio.play();
return;
}
c.continue();
};
}

/* AI */
function startListening(){
let rec=new webkitSpeechRecognition();
rec.continuous=true;
rec.onresult=e=>{
let cmd=e.results[e.results.length-1][0].transcript.toLowerCase();

if(cmd.startsWith("play video")) showMedia(cmd.replace("play video",""),"video");
else if(cmd.startsWith("show image")) showMedia(cmd.replace("show image",""),"image");
else if(cmd.startsWith("play song")) playMusic(cmd.replace("play song",""));
else if(cmd.includes("stop")) stopAll();
else if(cmd.includes("back")) goBack();
else if(cmd.includes("open images")) show("images");
else if(cmd.includes("open videos")) show("videos");
else if(cmd.includes("open music")) show("music");
else if(cmd.includes("open docs")) show("docs");
else if(cmd.includes("open camera")) show("camera");
else if(cmd.includes("open camera")) show("camera");
else if(cmd.includes("open trash")) show("trash");
};
rec.onend=()=>rec.start();
rec.start();
}

/* PARTICLES */
let canvas=document.getElementById("particlesCanvas");
let ctx=canvas.getContext("2d");
canvas.width=innerWidth;canvas.height=innerHeight;

let particles=[],shapeIndex=0;

function createShape(type){
particles=[];
for(let i=0;i<400;i++){
let x,y,z;
if(type==="sphere"){
let a=Math.random()*6.28,b=Math.random()*3.14,r=150;
x=r*Math.sin(b)*Math.cos(a);
y=r*Math.sin(b)*Math.sin(a);
z=r*Math.cos(b);
}
if(type==="cube"){
x=(Math.random()-0.5)*300;
y=(Math.random()-0.5)*300;
z=(Math.random()-0.5)*300;
}
if(type==="spiral"){
let t=i*0.1;
x=Math.cos(t)*t*5;
y=Math.sin(t)*t*5;
z=t*2;
}
if(type==="wave"){
x=(i%20)*20-200;
y=Math.sin(i*0.3)*50;
z=Math.cos(i*0.3)*50;
}
particles.push({x,y,z});
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
let scale=300/(300+p.z);
let x=p.x*scale+canvas.width/2;
let y=p.y*scale+canvas.height/2;
ctx.beginPath();
ctx.arc(x,y,2,0,6.28);
ctx.fillStyle="#38bdf8";
ctx.fill();
});
}

function animate(){
particles.forEach(p=>{
let a=0.01;
let x=p.x,z=p.z;
p.x=x*Math.cos(a)-z*Math.sin(a);
p.z=z*Math.cos(a)+x*Math.sin(a);
});
draw();
requestAnimationFrame(animate);
}

function startParticles(){
let shapes=["sphere","cube","spiral","wave"];
createShape(shapes[0]);
setInterval(()=>{
shapeIndex=(shapeIndex+1)%shapes.length;
createShape(shapes[shapeIndex]);
},5000);
animate();
}

</script>
